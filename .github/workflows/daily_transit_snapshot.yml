name: generate-daily-transits

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  run-transit-generator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generator
        run: python generate_transits.py

      - name: Commit dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Generate daily transit snapshot" || echo "No changes"
          git push
